# Render blueprint for the RenovateConnect API.
#   - web service (Docker) serving the Express API
#   - managed Postgres
#   - a cron job running the milestone auto-release sweep
#
# Secrets (sync: false / set in the dashboard): ANTHROPIC_API_KEY,
# STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, the AWS_*/S3_BUCKET set, and the
# APNS_* set. JWT_SECRET and INTERNAL_API_KEY are generated by Render.
#
# The web app (web/) deploys separately (Vercel); point renovateconnect.app at
# it and this API at api.renovateconnect.app (see LAUNCH_READINESS.md).

databases:
  - name: renovate-connect-db
    databaseName: renovate_connect
    user: renovate
    plan: basic-256mb

services:
  - type: web
    name: renovate-connect-api
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    plan: starter
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: renovate-connect-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: INTERNAL_API_KEY
        generateValue: true
      - key: APP_BASE_URL
        value: https://renovateconnect.app
      - key: WEB_ORIGINS
        value: https://renovateconnect.app
      - key: APNS_PRODUCTION
        value: "true"
      # Secrets — set in the Render dashboard.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: APNS_KEY_ID
        sync: false
      - key: APNS_TEAM_ID
        sync: false
      - key: APNS_BUNDLE_ID
        sync: false
      - key: APNS_KEY
        sync: false

  # Runs the idempotent milestone auto-release every 6 hours. Lets us disable the
  # in-process timer once the web service scales beyond a single instance.
  - type: cron
    name: renovate-connect-sweep
    runtime: docker
    dockerfilePath: ./api/Dockerfile
    dockerContext: ./api
    schedule: "0 */6 * * *"
    dockerCommand: node scripts/sweep.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: renovate-connect-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: STRIPE_SECRET_KEY
        sync: false
