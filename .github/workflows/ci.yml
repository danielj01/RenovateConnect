name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: renovate
          POSTGRES_PASSWORD: renovate
          POSTGRES_DB: renovate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - run: npm ci

      - name: Prisma migrate
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://renovate:renovate@localhost:5432/renovate_test

      - run: npm run lint

      - run: npm test
        env:
          # The Jest setup (tests/env.js + globalSetup.js) keys off
          # TEST_DATABASE_URL, so provide it explicitly here.
          TEST_DATABASE_URL: postgresql://renovate:renovate@localhost:5432/renovate_test
          DATABASE_URL: postgresql://renovate:renovate@localhost:5432/renovate_test
          JWT_SECRET: test-secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

  web:
    name: Web — build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run build

  docker:
    name: API — Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Validates the production image builds (npm ci + prisma generate succeed).
      - name: Build API image
        run: docker build -t renovate-connect-api ./api

  ios:
    name: iOS — build
    runs-on: macos-15

    defaults:
      run:
        working-directory: ios/RenovateConnect

    steps:
      - uses: actions/checkout@v4

      # The project uses the Xcode 16 file format (objectVersion 77), so pin a
      # 16.x toolchain rather than relying on the runner's default.
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild build \
            -scheme RenovateConnect \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
